# 后端监听端口
server:
  port: 8080
# 连接数据库
spring:
  profiles:
    active: dev,local # 默认激活开发环境与本地私有配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# JWT 配置
jwt:
  # JWT 签名密钥，优先读取环境变量 JWT_SECRET，若无则使用默认开发密钥
  secret: ${JWT_SECRET:weiqiang_equipment_system_management_secret_key_1234567890}
  # 过期时间：12小时，单位为毫秒
  expire: 43200000

# AI 大模型接口配置
ai:
  provider:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.siliconflow.cn/v1}
    model: ${AI_MODEL:deepseek-ai/DeepSeek-V4-Flash}
    timeout-ms: 30000


